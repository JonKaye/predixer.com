<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predixer Rating Calibrator</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#120826;min-height:100vh;padding:16px;color:#e2e8f0}
    #root{max-width:1100px;margin:0 auto}
    input[type=range]{-webkit-appearance:none;appearance:none;height:8px;border-radius:4px;outline:none;cursor:pointer;background:rgba(255,255,255,0.1)}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#3b82f6;cursor:pointer;border:2px solid #1C0B2E;box-shadow:0 1px 3px rgba(0,0,0,.4)}
    input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#3b82f6;cursor:pointer;border:2px solid #1C0B2E;box-shadow:0 1px 3px rgba(0,0,0,.4)}
    .ri{background:#2a1545;color:#e2e8f0;border:1px solid #4c3670;border-radius:4px;padding:3px 6px;font-family:inherit;font-size:12px;width:46px;text-align:center;font-weight:600}
    .ri:focus{border-color:#3b82f6;outline:none}
    .del-btn{background:none;border:1px solid #4c3670;color:#f87171;border-radius:4px;cursor:pointer;font-size:10px;padding:2px 6px;font-family:inherit;opacity:.6}
    .del-btn:hover{opacity:1;border-color:#dc2626}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useMemo,useCallback}=React;
function normalCDF(x){const a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=.3275911;const sign=x<0?-1:1,ax=Math.abs(x)/Math.sqrt(2),t=1/(1+p*ax);return .5*(1+sign*(1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-ax*ax)));}
function eloP(a,b){return 1/(1+Math.pow(10,(b-a)/400))}
function tsP(tA,tB,beta){const muA=tA.reduce((s,p)=>s+p.mu,0),muB=tB.reduce((s,p)=>s+p.mu,0);const sA=tA.reduce((s,p)=>s+p.sigma**2,0),sB=tB.reduce((s,p)=>s+p.sigma**2,0);return normalCDF((muA-muB)/Math.sqrt(sA+sB+2*Math.max(tA.length,tB.length)*beta**2));}
function r2r(rank,min,max){return max-((rank-1)/99)*(max-min)}
function computeRated(players,eloMin,eloMax,tsMin,tsMax,tsSigma){return players.map(p=>({...p,email:p.email||"",elo:Math.round(r2r(p.rank,eloMin,eloMax)+p.eloAdj),mu:+(r2r(p.rank,tsMin,tsMax)+p.muAdj).toFixed(2),sigma:+Math.max(.5,tsSigma+p.sigmaAdj).toFixed(2)}))}
function computeTeams(rated,sys){const m={};for(const p of rated){if(!m[p.team])m[p.team]=[];m[p.team].push(p)}return Object.entries(m).map(([name,members])=>({name,members,avgElo:Math.round(members.reduce((s,m)=>s+m.elo,0)/members.length),avgMu:+(members.reduce((s,m)=>s+m.mu,0)/members.length).toFixed(2)})).sort((a,b)=>sys==="elo"?b.avgElo-a.avgElo:b.avgMu-a.avgMu)}
function getProb(teams,a,b,sys,tsBeta){const tA=teams.find(t=>t.name===a),tB=teams.find(t=>t.name===b);if(!tA||!tB)return null;return sys==="elo"?eloP(tA.avgElo,tB.avgElo):tsP(tA.members,tB.members,tsBeta)}
function applyGame(players,game,sys,kF,tsBeta,tsSigma,eloMin,eloMax,tsMin,tsMax){const rated=computeRated(players,eloMin,eloMax,tsMin,tsMax,tsSigma);const teams=computeTeams(rated,sys);const wName=game.winner,lName=game.teamA===wName?game.teamB:game.teamA;const p=getProb(teams,game.teamA,game.teamB,sys,tsBeta);const sW=game.teamA===wName?"a":"b";return players.map(pl=>{const isW=pl.team===wName,isL=pl.team===lName;if(!isW&&!isL)return pl;if(sys==="elo"){const exp=isW?(sW==="a"?p:1-p):(sW==="a"?1-p:p);return{...pl,eloAdj:pl.eloAdj+Math.round(kF*((isW?1:0)-exp))}}else{const tW=teams.find(t=>t.name===wName),tL=teams.find(t=>t.name===lName);if(!tW||!tL)return pl;const c=Math.sqrt(tW.members.reduce((s,m)=>s+m.sigma**2,0)+tL.members.reduce((s,m)=>s+m.sigma**2,0)+2*Math.max(tW.members.length,tL.members.length)*tsBeta**2);const tv=(tW.members.reduce((s,m)=>s+m.mu,0)-tL.members.reduce((s,m)=>s+m.mu,0))/c;const pdf=Math.exp(-.5*tv*tv)/Math.sqrt(2*Math.PI),cdf=normalCDF(tv);const v=cdf>1e-10?pdf/cdf:0,w=v*(v+tv);const sq=(tsSigma+pl.sigmaAdj)**2,md=(sq/c)*v,sd=-.5*(sq/(c*c))*w*2;return isW?{...pl,muAdj:+(pl.muAdj+md).toFixed(3),sigmaAdj:+(pl.sigmaAdj+sd).toFixed(3)}:{...pl,muAdj:+(pl.muAdj-md).toFixed(3),sigmaAdj:+(pl.sigmaAdj+sd).toFixed(3)}}})}
function replayAll(basePlayers,games,sys,kF,tsBeta,tsSigma,eloMin,eloMax,tsMin,tsMax){let current=basePlayers.map(p=>({...p,eloAdj:0,muAdj:0,sigmaAdj:0}));const enriched=[];for(const g of games){const rB=computeRated(current,eloMin,eloMax,tsMin,tsMax,tsSigma);const tB=computeTeams(rB,sys);const preProb=getProb(tB,g.teamA,g.teamB,sys,tsBeta);current=applyGame(current,g,sys,kF,tsBeta,tsSigma,eloMin,eloMax,tsMin,tsMax);const rA=computeRated(current,eloMin,eloMax,tsMin,tsMax,tsSigma);const tA=computeTeams(rA,sys);const postProb=getProb(tA,g.teamA,g.teamB,sys,tsBeta);enriched.push({...g,preProb,postProb})}return{replayedPlayers:current,enrichedLog:enriched}}
const SAMPLE=`2,Mike,Team 1,mike@email.com\n3,Noah,Team 2,noah@email.com\n5,Eli,Team 3,eli@email.com\n5,Brian,Team 1,brian@email.com\n12,Gabe,Team 2,gabe@email.com\n15,Alex,Team 3,alex@email.com\n15,Josh,Team 1,josh@email.com\n20,Dan,Team 2,dan@email.com\n40,Sam,Team 3,sam@email.com\n45,Ryan,Team 1,ryan@email.com\n80,Leo,Team 2,leo@email.com\n85,Max,Team 3,max@email.com`;
const TABS=["Setup","Teams","Matchups","Simulate"];
function RatingCalibrator(){
  const [tab,setTab]=useState("Setup");const [bulk,setBulk]=useState("");const [players,setPlayers]=useState([]);const [displayOrder,setDisplayOrder]=useState([]);const [dirty,setDirty]=useState(false);const [sys,setSys]=useState("elo");const [eloMin,setEloMin]=useState(1200);const [eloMax,setEloMax]=useState(1800);const [tsMin,setTsMin]=useState(15);const [tsMax,setTsMax]=useState(35);const [tsSigma,setTsSigma]=useState(4.17);const [tsBeta,setTsBeta]=useState(2.08);const [kF,setKF]=useState(32);const [gameLog,setGameLog]=useState([]);const [mA,setMA]=useState("");const [mB,setMB]=useState("");const [sA,setSA]=useState("");const [sB,setSB]=useState("");const [sW,setSW]=useState("a");const [bulkGames,setBulkGames]=useState("");const [bulkGameErr,setBulkGameErr]=useState("");
  const sortOrd=useCallback(pl=>{const s=[...pl].sort((a,b)=>a.rank-b.rank||a.name.localeCompare(b.name));setDisplayOrder(s.map(p=>p.id))},[]);
  const parse=useCallback(()=>{const lines=bulk.trim().split("\n").filter(Boolean);const p=[];for(const l of lines){const parts=l.split(/\t|,/).map(s=>s.trim());if(parts.length>=3){const r=parseInt(parts[0]);if(!isNaN(r)&&r>=1&&r<=100)p.push({id:crypto.randomUUID(),rank:r,name:parts[1],team:parts[2],email:parts[3]||"",eloAdj:0,muAdj:0,sigmaAdj:0})}}setPlayers(p);sortOrd(p);setGameLog([]);setDirty(false)},[bulk,sortOrd]);
  const updatePlayerRank=useCallback((id,nr)=>{const c=Math.max(1,Math.min(100,nr));setPlayers(prev=>prev.map(p=>p.id===id?{...p,rank:c}:p));setDirty(true)},[]);
  const resort=useCallback(()=>{sortOrd(players);setDirty(false)},[players,sortOrd]);
  const {enrichedLog,replayedPlayers}=useMemo(()=>{if(gameLog.length===0)return{enrichedLog:[],replayedPlayers:players};return replayAll(players,gameLog,sys,kF,tsBeta,tsSigma,eloMin,eloMax,tsMin,tsMax)},[players,gameLog,sys,kF,tsBeta,tsSigma,eloMin,eloMax,tsMin,tsMax]);
  const rated=useMemo(()=>computeRated(replayedPlayers,eloMin,eloMax,tsMin,tsMax,tsSigma),[replayedPlayers,eloMin,eloMax,tsMin,tsMax,tsSigma]);
  const ratedMap=useMemo(()=>{const m=new Map();rated.forEach(p=>m.set(p.id,p));return m},[rated]);
  const displayRated=useMemo(()=>displayOrder.map(id=>ratedMap.get(id)).filter(Boolean),[displayOrder,ratedMap]);
  const teams=useMemo(()=>computeTeams(rated,sys),[rated,sys]);
  const tNames=teams.map(t=>t.name);
  const teamNameMap=useMemo(()=>{const m=new Map();tNames.forEach(n=>m.set(n.toLowerCase(),n));return m},[tNames]);
  const prob=useCallback((a,b)=>getProb(teams,a,b,sys,tsBeta),[teams,sys,tsBeta]);
  const simulate=()=>{if(!sA||!sB||sA===sB)return;setGameLog(prev=>[...prev,{id:crypto.randomUUID(),teamA:sA,teamB:sB,winner:sW==="a"?sA:sB}])};
  const parseBulkGames=()=>{const lines=bulkGames.trim().split("\n").filter(Boolean);const ng=[];const errs=[];for(let i=0;i<lines.length;i++){const parts=lines[i].split(/\t|,/).map(s=>s.trim());if(parts.length<3){errs.push("Line "+(i+1)+": need Team A, Team B, Winner");continue}const tA=teamNameMap.get(parts[0].toLowerCase()),tB=teamNameMap.get(parts[1].toLowerCase()),wn=teamNameMap.get(parts[2].toLowerCase());if(!tA){errs.push("Line "+(i+1)+': unknown team "'+parts[0]+'"');continue}if(!tB){errs.push("Line "+(i+1)+': unknown team "'+parts[1]+'"');continue}if(!wn){errs.push("Line "+(i+1)+': unknown winner "'+parts[2]+'"');continue}if(tA===tB){errs.push("Line "+(i+1)+": same team");continue}if(wn!==tA&&wn!==tB){errs.push("Line "+(i+1)+": winner must be one of the two teams");continue}ng.push({id:crypto.randomUUID(),teamA:tA,teamB:tB,winner:wn})}if(errs.length>0){setBulkGameErr(errs.join("\n"));return}setBulkGameErr("");setGameLog(prev=>[...prev,...ng]);setBulkGames("")};
  const deleteGame=useCallback(gid=>{setGameLog(prev=>prev.filter(g=>g.id!==gid))},[]);
  const resetAll=()=>{setGameLog([])};
  const exportCSV=()=>{const sorted=[...rated].sort((a,b)=>a.rank-b.rank||a.name.localeCompare(b.name));const hdr=sys==="elo"?"Rank,Name,Team,Email,Elo\n":"Rank,Name,Team,Email,Mu,Sigma\n";const rows=sorted.map(p=>sys==="elo"?p.rank+',"'+p.name+'","'+p.team+'","'+(p.email||"")+'",'+p.elo:p.rank+',"'+p.name+'","'+p.team+'","'+(p.email||"")+'",'+p.mu+","+p.sigma).join("\n");const b=new Blob([hdr+rows],{type:"text/csv"});const u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download="calibrated-ratings.csv";a.click();URL.revokeObjectURL(u)};
  const pc=p=>{if(p===null)return"transparent";const v=Math.round(p*100);return v>=65?"#22c55e":v>=55?"#84cc16":v>=45?"#eab308":v>=35?"#f97316":"#ef4444"};
  const pbg=p=>{if(p===null)return"transparent";const v=Math.round(p*100);return v>=65?"rgba(22,163,74,.1)":v>=55?"rgba(101,163,13,.08)":v>=45?"rgba(202,138,4,.08)":v>=35?"rgba(234,88,12,.08)":"rgba(220,38,38,.1)"};
  const fmtP=p=>p!==null?(p*100).toFixed(1)+"%":"–";
  const S={app:{fontFamily:"'JetBrains Mono','SF Mono','Fira Code',monospace",maxWidth:1100,margin:"0 auto",color:"#e2e8f0",fontSize:13},hdr:{padding:"14px 20px",borderRadius:8,background:"#1C0B2E",marginBottom:4,display:"flex",alignItems:"center",gap:14,border:"1px solid #2a1545"},h1:{fontSize:18,fontWeight:700,margin:0,letterSpacing:"-.02em",color:"#fff"},sub:{fontSize:11,opacity:.6,color:"#a5b4fc"},tabs:{display:"flex",gap:0,marginTop:12},tab:a=>({padding:"8px 16px",cursor:"pointer",borderBottom:a?"2px solid #818cf8":"2px solid transparent",opacity:a?1:.5,fontWeight:a?600:400,fontSize:13,background:"none",color:"inherit",fontFamily:"inherit"}),sec:{padding:"16px 0"},lbl:{fontSize:11,textTransform:"uppercase",letterSpacing:".05em",opacity:.5,marginBottom:4,display:"block"},ta:{width:"100%",minHeight:160,background:"#1e0f35",color:"#e2e8f0",border:"1px solid #4c3670",borderRadius:6,padding:10,fontFamily:"inherit",fontSize:12,resize:"vertical",boxSizing:"border-box"},taSm:{width:"100%",minHeight:80,background:"#1e0f35",color:"#e2e8f0",border:"1px solid #4c3670",borderRadius:6,padding:10,fontFamily:"inherit",fontSize:12,resize:"vertical",boxSizing:"border-box"},btn:{padding:"6px 14px",background:"#6366f1",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600},btn2:{padding:"6px 14px",background:"transparent",color:"#a5b4fc",border:"1px solid #4c3670",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontSize:12},btnW:{padding:"6px 14px",background:"#f59e0b",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600},row:{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"},card:{background:"#1e0f35",borderRadius:8,padding:14,border:"1px solid #2a1545"},tbl:{width:"100%",borderCollapse:"collapse",fontSize:12},th:{textAlign:"left",padding:"6px 8px",borderBottom:"2px solid #2a1545",fontSize:11,textTransform:"uppercase",opacity:.5,color:"#a5b4fc"},td:{padding:"5px 8px",borderBottom:"1px solid rgba(74,54,112,0.4)"},sel:{background:"#1e0f35",color:"#e2e8f0",border:"1px solid #4c3670",borderRadius:4,padding:"6px 10px",fontFamily:"inherit",fontSize:12},inp:{background:"#1e0f35",color:"#e2e8f0",border:"1px solid #4c3670",borderRadius:4,padding:"6px 10px",fontFamily:"inherit",fontSize:12,width:70},pill:a=>({padding:"4px 12px",borderRadius:20,cursor:"pointer",background:a?"#6366f1":"transparent",color:a?"#fff":"#a5b4fc",border:a?"none":"1px solid #4c3670",fontSize:12,fontFamily:"inherit"}),pcell:p=>({padding:"4px 6px",textAlign:"center",fontSize:11,fontWeight:600,background:pbg(p),color:pc(p),borderRadius:3,minWidth:42}),err:{background:"rgba(220,38,38,0.1)",border:"1px solid rgba(220,38,38,0.3)",borderRadius:4,padding:8,fontSize:11,color:"#dc2626",whiteSpace:"pre-wrap",marginTop:8}};
  const teamSnap=useMemo(()=>teams.map(t=>({name:t.name,avg:sys==="elo"?t.avgElo:t.avgMu,members:t.members.map(m=>({name:m.name,rating:sys==="elo"?m.elo:m.mu,adj:sys==="elo"?m.eloAdj:m.muAdj}))})),[teams,sys]);
  const standings=useMemo(()=>{const rec={};tNames.forEach(n=>rec[n]={w:0,l:0});for(const g of gameLog){const loser=g.teamA===g.winner?g.teamB:g.teamA;if(rec[g.winner])rec[g.winner].w++;if(rec[loser])rec[loser].l++}return Object.entries(rec).map(([name,r])=>({name,w:r.w,l:r.l,pct:r.w+r.l>0?(r.w/(r.w+r.l)):null})).sort((a,b)=>b.w-a.w||(a.pct===null?0:b.pct-a.pct))},[tNames,gameLog]);
  return(
  <div style={S.app}>
    <div style={S.hdr}>
      <img src="../images/predixer-logo.png" style={{width:36,height:36,borderRadius:6}} alt="Predixer"/>
      <div><div style={S.h1}>Rating Calibrator</div><div style={S.sub}>Map skill rankings to synthetic ratings and matchup probabilities</div></div>
    </div>
    <div style={S.tabs}>{TABS.map(t=><button key={t} style={S.tab(tab===t)} onClick={()=>setTab(t)}>{t}</button>)}</div>

    {tab==="Setup"&&<div style={S.sec}>
      <div style={{...S.row,marginBottom:12}}><span style={S.lbl}>Rating System</span><button style={S.pill(sys==="elo")} onClick={()=>setSys("elo")}>Elo</button><button style={S.pill(sys==="trueskill")} onClick={()=>setSys("trueskill")}>TrueSkill</button></div>
      <div style={{fontSize:11,opacity:.45,marginBottom:12,lineHeight:1.6}}>{sys==="elo"
        ?"Elo uses a single rating per player with no uncertainty — the same rank gap always produces the same win probability. Adjust the Min/Max range to control how spread out probabilities are: a wider range (e.g. 1000–2000) creates more decisive matchups, a narrower range pushes everything toward 50/50. K Factor controls how much ratings shift per simulated game."
        :"TrueSkill includes an uncertainty value (σ) per player, which dampens probabilities toward 50/50 — especially with few games played. If matchups look too close to a coin flip, try widening the μ range (e.g. 10–40), lowering σ, or lowering β. Compared to Elo, the same rank inputs will generally produce less extreme probabilities because of this built-in uncertainty."
      }</div>
      {sys==="elo"?<div style={{...S.row,marginBottom:16,gap:20}}>
        <div><label style={S.lbl}>Min Elo (rank 100)</label><input type="number" value={eloMin} onChange={e=>setEloMin(+e.target.value)} style={S.inp}/></div>
        <div><label style={S.lbl}>Max Elo (rank 1)</label><input type="number" value={eloMax} onChange={e=>setEloMax(+e.target.value)} style={S.inp}/></div>
        <div><label style={S.lbl}>K Factor</label><input type="number" value={kF} onChange={e=>setKF(+e.target.value)} style={S.inp}/></div>
      </div>:<div style={{...S.row,marginBottom:16,gap:20}}>
        <div><label style={S.lbl}>Min μ (rank 100)</label><input type="number" value={tsMin} onChange={e=>setTsMin(+e.target.value)} style={S.inp} step="0.5"/></div>
        <div><label style={S.lbl}>Max μ (rank 1)</label><input type="number" value={tsMax} onChange={e=>setTsMax(+e.target.value)} style={S.inp} step="0.5"/></div>
        <div><label style={S.lbl}>σ</label><input type="number" value={tsSigma} onChange={e=>setTsSigma(+e.target.value)} style={S.inp} step="0.1"/></div>
        <div><label style={S.lbl}>β</label><input type="number" value={tsBeta} onChange={e=>setTsBeta(+e.target.value)} style={S.inp} step="0.1"/></div>
      </div>}
      <label style={S.lbl}>Paste players: Rank (1–100), Name, Team, Email (optional)</label>
      <div style={{fontSize:11,opacity:.4,marginTop:4,marginBottom:8,lineHeight:1.5}}>1 = best, 100 = worst. Same rank = same rating. Email is optional. Edit ranks below, then press Re-sort.</div>
      <textarea style={S.ta} value={bulk} onChange={e=>setBulk(e.target.value)} placeholder={"2,Mike,Team 1,mike@email.com\n3,Noah,Team 2,noah@email.com\n5,Eli,Team 3"} spellCheck={false}/>
      <div style={{...S.row,marginTop:10}}><button style={S.btn} onClick={parse}>Parse & Map Ratings</button><button style={S.btn2} onClick={()=>setBulk(SAMPLE)}>Load Sample</button>{players.length>0&&<button style={S.btn2} onClick={exportCSV}>Export CSV</button>}</div>
      {players.length>0&&<>
        <div style={{...S.row,gap:32,marginTop:16,marginBottom:16}}>
          {[["Players",players.length],["Teams",tNames.length],["Simulated",gameLog.length]].map(([l,v])=><div key={l} style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:"#e2e8f0"}}>{v}</div><div style={{fontSize:10,textTransform:"uppercase",opacity:.5}}>{l}</div></div>)}
        </div>
        <div style={{...S.card,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={S.lbl}>Player Rankings <span style={{textTransform:"none",opacity:.5}}>(type or drag)</span></div>
            {dirty&&<button style={S.btnW} onClick={resort}>Re-sort ↓</button>}
          </div>
          <table style={{...S.tbl,fontSize:11}}><thead><tr><th style={{...S.th,width:56}}>Rank</th><th style={S.th}>Name</th><th style={S.th}>Team</th><th style={S.th}>Email</th><th style={{...S.th,width:60}}>{sys==="elo"?"Elo":"μ"}</th>{gameLog.length>0&&<th style={{...S.th,width:50}}>Adj</th>}<th style={{...S.th,width:"35%"}}>Position</th></tr></thead><tbody>
            {displayRated.map(p=><tr key={p.id}>
              <td style={S.td}><input type="number" className="ri" min="1" max="100" value={p.rank} onChange={e=>{const v=parseInt(e.target.value);if(!isNaN(v))updatePlayerRank(p.id,v)}}/></td>
              <td style={S.td}>{p.name}</td><td style={S.td}>{p.team}</td><td style={{...S.td,opacity:.5,fontSize:11}}>{p.email}</td>
              <td style={{...S.td,fontWeight:600}}>{sys==="elo"?p.elo:p.mu}</td>
              {gameLog.length>0&&<td style={{...S.td,color:(sys==="elo"?p.eloAdj:p.muAdj)>0?"#16a34a":(sys==="elo"?p.eloAdj:p.muAdj)<0?"#dc2626":"inherit",fontSize:11}}>{sys==="elo"?(p.eloAdj>=0?"+":"")+p.eloAdj:(p.muAdj>=0?"+":"")+p.muAdj.toFixed(2)}</td>}
              <td style={{...S.td,paddingRight:12}}><input type="range" min="1" max="100" value={p.rank} onChange={e=>updatePlayerRank(p.id,+e.target.value)} style={{width:"100%"}}/></td>
            </tr>)}
          </tbody></table>
        </div>
      </>}
    </div>}

    {tab==="Teams"&&<div style={S.sec}>
      {teams.length===0?<div style={{opacity:.5,padding:40,textAlign:"center"}}>Parse players first</div>:
      <div style={{display:"grid",gap:8,gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))"}}>
        {teams.map((t,i)=><div key={t.name} style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontWeight:700,fontSize:14,color:"#e2e8f0"}}>{t.name}</div>
            <div style={{fontSize:18,fontWeight:700,color:"#3b82f6"}}>{sys==="elo"?t.avgElo:t.avgMu}<span style={{fontSize:10,opacity:.5,marginLeft:4}}>{sys==="elo"?"avg Elo":"avg μ"}</span></div>
          </div>
          <div style={{fontSize:11,opacity:.5,marginBottom:6}}>{t.members.length} players · #{i+1}</div>
          <table style={{...S.tbl,fontSize:11}}><tbody>{t.members.sort((a,b)=>a.rank-b.rank).map(m=><tr key={m.id}><td style={{...S.td,opacity:.5,width:28}}>{m.rank}</td><td style={S.td}>{m.name}</td><td style={{...S.td,textAlign:"right",fontWeight:600}}>{sys==="elo"?m.elo:m.mu}</td></tr>)}</tbody></table>
        </div>)}
      </div>}
    </div>}

    {tab==="Matchups"&&<div style={S.sec}>
      {teams.length<2?<div style={{opacity:.5,padding:40,textAlign:"center"}}>Need 2+ teams</div>:<>
        <div style={{...S.row,marginBottom:20,gap:16}}>
          <div><label style={S.lbl}>Team A</label><select style={S.sel} value={mA} onChange={e=>setMA(e.target.value)}><option value="">Select...</option>{tNames.map(n=><option key={n} value={n}>{n}</option>)}</select></div>
          <div style={{fontSize:18,fontWeight:700,opacity:.3,paddingTop:16}}>vs</div>
          <div><label style={S.lbl}>Team B</label><select style={S.sel} value={mB} onChange={e=>setMB(e.target.value)}><option value="">Select...</option>{tNames.map(n=><option key={n} value={n}>{n}</option>)}</select></div>
          {mA&&mB&&mA!==mB&&(()=>{const p=prob(mA,mB);return<div style={{...S.card,display:"flex",gap:24,padding:"10px 20px",alignItems:"center"}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:pc(p)}}>{fmtP(p)}</div><div style={{fontSize:10,opacity:.5}}>{mA}</div></div>
            <div style={{fontSize:14,opacity:.3}}>–</div>
            <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:pc(1-p)}}>{fmtP(1-p)}</div><div style={{fontSize:10,opacity:.5}}>{mB}</div></div>
          </div>})()}
        </div>
        <label style={{...S.lbl,marginBottom:8}}>Full Matchup Matrix (row team win %)</label>
        <div style={{overflowX:"auto"}}><table style={{...S.tbl,fontSize:11}}><thead><tr><th style={{...S.th,position:"sticky",left:0,background:"#120826",zIndex:1}}></th>{tNames.map(n=><th key={n} style={{...S.th,textAlign:"center",...(tNames.length>8?{writingMode:"vertical-rl",maxWidth:32}:{})}}>{n}</th>)}</tr></thead><tbody>
          {tNames.map(row=><tr key={row}><td style={{...S.td,fontWeight:600,whiteSpace:"nowrap",position:"sticky",left:0,background:"#120826",zIndex:1}}>{row}</td>
            {tNames.map(col=>{if(row===col)return<td key={col} style={{...S.td,textAlign:"center",opacity:.2}}>—</td>;const p=prob(row,col);return<td key={col} style={S.td}><div style={S.pcell(p)}>{(p*100).toFixed(0)}%</div></td>})}
          </tr>)}
        </tbody></table></div>
      </>}
    </div>}

    {tab==="Simulate"&&<div style={S.sec}>
      {teams.length<2?<div style={{opacity:.5,padding:40,textAlign:"center"}}>Need 2+ teams</div>:<>
        <div style={{...S.card,marginBottom:12}}>
          <div style={{...S.lbl,marginBottom:8}}>Add Single Game</div>
          <div style={{...S.row,gap:16}}>
            <div><label style={S.lbl}>Team A</label><select style={S.sel} value={sA} onChange={e=>setSA(e.target.value)}><option value="">Select...</option>{tNames.map(n=><option key={n} value={n}>{n}</option>)}</select></div>
            <div style={{paddingTop:16,opacity:.3,fontWeight:700}}>vs</div>
            <div><label style={S.lbl}>Team B</label><select style={S.sel} value={sB} onChange={e=>setSB(e.target.value)}><option value="">Select...</option>{tNames.map(n=><option key={n} value={n}>{n}</option>)}</select></div>
            {sA&&sB&&sA!==sB&&<>
              <div><label style={S.lbl}>Winner</label><div style={{...S.row,gap:4}}><button style={S.pill(sW==="a")} onClick={()=>setSW("a")}>{sA}</button><button style={S.pill(sW==="b")} onClick={()=>setSW("b")}>{sB}</button></div></div>
              <div style={{paddingTop:14}}><button style={S.btn} onClick={simulate}>Apply</button></div>
            </>}
          </div>
          {sA&&sB&&sA!==sB&&(()=>{const p=prob(sA,sB);return<div style={{marginTop:10,fontSize:12,opacity:.6}}>Current: {sA} {fmtP(p)} – {fmtP(1-p)} {sB}</div>})()}
        </div>

        <div style={{...S.card,marginBottom:12}}>
          <div style={{...S.lbl,marginBottom:8}}>Bulk Import Games</div>
          <div style={{fontSize:11,opacity:.4,marginBottom:8,lineHeight:1.5}}>One game per line: Team A, Team B, Winner (tab or comma separated). Team names must match exactly.</div>
          <textarea style={S.taSm} value={bulkGames} onChange={e=>{setBulkGames(e.target.value);setBulkGameErr("")}} placeholder={"Team 1,Team 3,Team 1\nTeam 2,Team 1,Team 2\nTeam 3,Team 2,Team 3"} spellCheck={false}/>
          <div style={{...S.row,marginTop:8}}><button style={S.btn} onClick={parseBulkGames}>Import Games</button></div>
          {bulkGameErr&&<div style={S.err}>{bulkGameErr}</div>}
        </div>

        <div style={{...S.row,gap:12,marginBottom:12}}>
          <button style={S.btn2} onClick={resetAll}>Reset All Games</button>
          {gameLog.length>0&&<span style={{fontSize:12,opacity:.5}}>{gameLog.length} game(s)</span>}
        </div>

        <div style={{...S.card,marginBottom:16}}>
          <div style={{...S.lbl,marginBottom:8}}>Standings</div>
          <table style={{...S.tbl,fontSize:12}}><thead><tr><th style={S.th}>Team</th><th style={{...S.th,width:50,textAlign:"center"}}>W</th><th style={{...S.th,width:50,textAlign:"center"}}>L</th><th style={{...S.th,width:60,textAlign:"center"}}>Pct</th></tr></thead><tbody>
            {standings.map(s=><tr key={s.name}><td style={{...S.td,fontWeight:600}}>{s.name}</td><td style={{...S.td,textAlign:"center"}}>{s.w}</td><td style={{...S.td,textAlign:"center"}}>{s.l}</td><td style={{...S.td,textAlign:"center"}}>{s.pct!==null?(s.pct*100).toFixed(1)+"%":"–"}</td></tr>)}
          </tbody></table>
        </div>

        {enrichedLog.length>0&&<>
          <div style={{...S.lbl,marginBottom:8}}>Team Ratings After {enrichedLog.length} Game(s)</div>
          <div style={{display:"grid",gap:8,gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",marginBottom:16}}>
            {teamSnap.map(t=><div key={t.name} style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontWeight:700}}>{t.name}</span>
                <span style={{fontWeight:700,color:"#3b82f6"}}>{t.avg} <span style={{fontSize:10,opacity:.5}}>{sys==="elo"?"avg":"avg μ"}</span></span>
              </div>
              <table style={{...S.tbl,fontSize:11}}><tbody>
                {t.members.sort((a,b)=>b.rating-a.rating).map(m=><tr key={m.name}>
                  <td style={S.td}>{m.name}</td>
                  <td style={{...S.td,fontWeight:600,textAlign:"right"}}>{sys==="elo"?Math.round(m.rating):m.rating.toFixed(1)}</td>
                  <td style={{...S.td,textAlign:"right",width:50,color:m.adj>0?"#16a34a":m.adj<0?"#dc2626":"inherit",fontSize:11}}>
                    {sys==="elo"?(m.adj>=0?"+":"")+Math.round(m.adj):(m.adj>=0?"+":"")+m.adj.toFixed(1)}
                  </td>
                </tr>)}
              </tbody></table>
            </div>)}
          </div>

          <div style={{...S.lbl,marginBottom:8}}>Game Log</div>
          <div style={{maxHeight:300,overflowY:"auto"}}>
            <table style={S.tbl}><thead><tr>
              <th style={S.th}>#</th><th style={S.th}>Winner</th><th style={S.th}>Loser</th><th style={S.th}>Pre-game</th><th style={S.th}>Post-game</th><th style={{...S.th,width:36}}></th>
            </tr></thead><tbody>
              {enrichedLog.map((g,i)=>{
                const loser=g.teamA===g.winner?g.teamB:g.teamA;
                const preW=g.teamA===g.winner?g.preProb:1-g.preProb;
                const postW=g.teamA===g.winner?g.postProb:1-g.postProb;
                return<tr key={g.id}>
                  <td style={S.td}>{i+1}</td>
                  <td style={{...S.td,fontWeight:600}}>{g.winner}</td>
                  <td style={S.td}>{loser}</td>
                  <td style={{...S.td,fontSize:11}}><span style={{color:pc(preW)}}>{g.winner} {fmtP(preW)}</span>{" – "}<span style={{color:pc(1-preW)}}>{loser} {fmtP(1-preW)}</span></td>
                  <td style={{...S.td,fontSize:11}}><span style={{color:pc(postW)}}>{g.winner} {fmtP(postW)}</span>{" – "}<span style={{color:pc(1-postW)}}>{loser} {fmtP(1-postW)}</span></td>
                  <td style={{...S.td,textAlign:"center"}}><button className="del-btn" onClick={()=>deleteGame(g.id)} title="Remove game and recalculate">✕</button></td>
                </tr>})}
            </tbody></table>
          </div>
        </>}
      </>}
    </div>}
  </div>);
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(RatingCalibrator));
</script>
</body>
</html>
